<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Manifold Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0369a1 100%); 
            text-align: center; 
            margin: 0; 
            padding: 30px 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 40px 25px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); 
        }

        h2 { 
            color: #38bdf8; 
            margin: 0 0 8px 0; 
            font-size: 26px; 
            font-weight: 700; 
        }

        .subtitle { 
            color: #94a3b8; 
            font-size: 14px; 
            margin-bottom: 35px; 
        }
        
        .card { 
            background: linear-gradient(135deg, rgba(2, 136, 209, 0.25), rgba(0, 86, 145, 0.4)); 
            padding: 40px 25px; 
            border-radius: 24px; 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .label { 
            font-size: 12px; 
            letter-spacing: 2px; 
            margin-bottom: 25px; 
            color: #bae6fd;
        }

        .value { 
            font-size: 64px; 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 30px; 
        }

        .status-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Manifold Nitrous Oxide</h2>
        <div class="subtitle">ระบบมอนิเตอร์ค่าแรงดันก๊าซ</div>
        
        <div class="card">
            <div class="label">NITROUS OXIDE PRESSURE</div>
            <div class="value" id="ox_val">--.- PSI</div>
            <div id="status_text" class="status-box">กำลังโหลด...</div>
        </div>
    </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDBjXBCQYUW0wzpjIB-leNS0gr-DlVcvdg",
    authDomain: "nitrous1-b4ad5.firebaseapp.com",
    databaseURL: "https://nitrous1-b4ad5-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nitrous1-b4ad5",
    storageBucket: "nitrous1-b4ad5.firebasestorage.app",
    messagingSenderId: "268190423733",
    appId: "1:268190423733:web:e2f3369b50e4d088c53cfc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ✅ IMPORTANT: ต้องตรงกับ ESP32 = data
onValue(ref(db, "data"), (snapshot) => {

    const data = snapshot.val();
    if (!data) return;

    let psi = Number(data.pressure || 0);

    document.getElementById("ox_val").innerText = psi.toFixed(1) + " PSI";

    let status = document.getElementById("status_text");

    if (psi < 45) {
        status.innerText = "⚠️ แรงดันต่ำ";
        status.style.color = "#ff6b6b";
    } else {
        status.innerText = "✅ ปกติ";
        status.style.color = "#2ecc71";
    }
});

</script>

</body>
</html>
